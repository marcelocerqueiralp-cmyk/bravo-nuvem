[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log

[program:fastapi]
command=uvicorn main:app --host 0.0.0.0 --port %(ENV_PORT)s
directory=/app
autostart=true
autorestart=true

[program:whatsapp]
command=node whatsapp/whatsapp_bravo.js
directory=/app
autostart=false
autorestart=false
environment=PUPPETEER_EXECUTABLE_PATH="/usr/bin/chromium"
